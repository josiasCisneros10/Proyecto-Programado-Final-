<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar contraseña</title>
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>
<body>
    <main class="contenedor">
        <section class="panel">
            <h1>Recuperar contraseña</h1>

            <p class="mensaje error" th:if="${error}" th:text="${error}"></p>
            <p class="mensaje exito" th:if="${mensaje}" th:text="${mensaje}"></p>
            <p class="token" th:if="${token}" th:text="${token}"></p>

            <h2>Generar token</h2>
            <form th:action="@{/recuperar-password}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <label for="correo">Correo</label>
                <input type="email" id="correo" name="correo" required>

                <button type="submit">Generar token</button>
            </form>

            <h2>Cambiar contraseña</h2>
            <form th:action="@{/cambiar-password}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <label for="token">Token</label>
                <input type="text" id="token" name="token" required>

                <label for="nuevaPassword">Nueva contraseña</label>
                <input type="password" id="nuevaPassword" name="nuevaPassword" required>

                <button type="submit">Cambiar contraseña</button>
            </form>

            <div class="links">
                <a th:href="@{/login}">Volver al login</a>
            </div>
        </section>
    </main>
</body>
</html>
