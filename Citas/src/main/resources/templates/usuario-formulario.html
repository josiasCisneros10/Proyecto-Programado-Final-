<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar usuario</title>
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>
<body>
    <main class="contenedor">
        <section class="panel">
            <h1>Editar usuario</h1>

            <p class="mensaje error" th:if="${error}" th:text="${error}"></p>

            <form th:action="@{/usuarios/editar/{id}(id=${usuario.id})}" method="post" th:object="${usuario}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <label for="nombre">Nombre</label>
                <input type="text" id="nombre" th:field="*{nombre}" required>

                <label for="cedula">Cédula</label>
                <input type="text" id="cedula" th:field="*{cedula}" required>

                <label for="correo">Correo</label>
                <input type="email" id="correo" th:field="*{correo}" required>

                <label for="contacto">Contacto</label>
                <input type="text" id="contacto" th:field="*{contacto}">

                <label for="nuevaPassword">Nueva contraseña</label>
                <input type="password" id="nuevaPassword" name="nuevaPassword">

                <button type="submit">Guardar</button>
            </form>

            <div class="links">
                <a th:href="@{/usuarios}">Volver a usuarios</a>
            </div>
        </section>
    </main>
</body>
</html>
