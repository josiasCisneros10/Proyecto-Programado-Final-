<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesion</title>
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>
<body>
    <main class="contenedor">
        <section class="panel">
            <h1>Iniciar sesión</h1>

            <p class="mensaje error" th:if="${param.error}">Correo o contraseña incorrectos.</p>
            <p class="mensaje exito" th:if="${param.logout}">Sesión cerrada correctamente.</p>
            <p class="mensaje exito" th:if="${param.registroExitoso}">Usuario registrado correctamente.</p>
            <p class="mensaje exito" th:if="${param.passwordCambiada}">Contraseña actualizada correctamente.</p>

            <form th:action="@{/login}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <label for="username">Correo</label>
                <input type="email" id="username" name="username" required>

                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" required>

                <button type="submit">Iniciar sesión</button>
            </form>

            <div class="links">
                <a th:href="@{/registro}">Crear cuenta</a>
                <a th:href="@{/recuperar-password}">Recuperar contraseña</a>
            </div>
        </section>
    </main>
</body>
</html>
